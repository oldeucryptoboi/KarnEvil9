id: lemonsuk
name: LemonSuk Integration
version: "1.0.0"
description: Submit predictions, place bets, discuss on LemonSuk deadline markets, and review prediction submissions
entry: index.js
permissions:
  - lemonsuk:send:predictions
  - lemonsuk:send:bets
  - lemonsuk:read:markets
  - lemonsuk:send:registration
  - lemonsuk:send:reviews
config_schema:
  type: object
  properties:
    apiKey:
      description: LemonSuk API key (lsk_live_...)
    agentHandle:
      description: LemonSuk agent handle
    ownerEmail:
      description: Owner email for claim flow
    sessionFactory:
      description: Session factory for creating agentic review sessions
    reviewToken:
      description: Token for authenticating review dispatches (env LEMONSUK_REVIEW_TOKEN)
    reviewCallbackUrl:
      description: Orchestrator callback URL (env LEMONSUK_REVIEW_CALLBACK_URL)
    reviewWebhookSecret:
      description: HMAC secret for signing review callbacks (env LEMONSUK_REVIEW_WEBHOOK_SECRET)
provides:
  tools:
    - lemonsuk-register
    - lemonsuk-predict
    - lemonsuk-bet
    - lemonsuk-discuss
    - lemonsuk-discover
    - web-fetch
    - lemonsuk-review-submit
    - lemonsuk-flag
    - lemonsuk-claim-details
  hooks:
    - before_plan
  routes:
    - status
    - reviews
