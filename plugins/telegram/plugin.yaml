id: telegram
name: Telegram Integration
version: "1.1.0"
description: Bidirectional Telegram integration — receive tasks via DMs, post progress, handle approvals
entry: index.js
permissions:
  - telegram:send:messages
  - telegram:receive:events
config_schema:
  type: object
  properties:
    sessionFactory:
      description: Session factory function (injected at runtime)
    journal:
      description: Journal instance for event subscription (injected at runtime)
    apiBaseUrl:
      description: Base URL of the KarnEvil9 API server (injected at runtime)
    apiToken:
      description: KarnEvil9 API token for authenticated calls (injected at runtime)
provides:
  tools:
    - send-telegram-message
  hooks:
    - before_plan
    - after_session_end
  routes:
    - status
    - conversations
    - pairing
    - pairing/:code/approve
    - pairing/:code/deny
  services:
    - telegram-connection
