name: delegate
version: "1.0.0"
description: >
  Delegate a subtask to a child session that runs independently and returns
  a summary. The child has its own planner and access to all the same tools.
  Describe what you need, not how to do it. Prefer this over calling
  data-heavy tools directly to keep your context clean.
runner: internal
input_schema:
  type: object
  required:
    - task
  properties:
    task:
      type: string
      description: "What you need done. The child has no conversation history — include any necessary context."
    tool_allowlist:
      type: array
      items:
        type: string
      description: "Optional list of tool names the child is allowed to use. If omitted, all tools are available."
    max_iterations:
      type: number
      description: "Max agentic iterations for the child session (default: 5)"
  additionalProperties: false
output_schema:
  type: object
  required:
    - status
    - summary
  properties:
    status:
      type: string
      enum:
        - completed
        - failed
        - aborted
        - dry_run
    summary:
      type: string
      description: "The child session's final response text or a summary of its findings"
    findings:
      type: array
      items:
        type: object
        properties:
          step_title:
            type: string
          tool_name:
            type: string
          status:
            type: string
          summary:
            type: string
    session_id:
      type: string
    tokens_used:
      type: number
  additionalProperties: false
permissions: []
timeout_ms: 180000
supports:
  mock: true
  dry_run: true
mock_responses:
  - status: completed
    summary: "Mock delegation completed successfully. The child session processed the subtask and returned a summary."
    findings:
      - step_title: "Process subtask"
        tool_name: "respond"
        status: "succeeded"
        summary: "Subtask completed with mock results."
    session_id: "mock-child-session"
    tokens_used: 1000
